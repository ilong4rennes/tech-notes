site_name: Amanda's Notes
site_url: https://ilong4rennes.github.io/tech-notes/
site_author: Yichen Lu
site_description: Personal notes on CS, tech, and life.

repo_name: ilong4rennes/tech-notes
repo_url: https://github.com/ilong4rennes/tech-notes

docs_dir: .

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Academics: Academics/
  - Technology: Technology/
  - Projects: Projects/
  - Life: Life/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ilong4rennes
