name: Deploy MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Prepare docs folder
        run: |
          mkdir -p docs
          cp README.md docs/index.md

          for folder in Academics Technology Projects Life; do
            if [ -d "$folder" ]; then
              cp -r "$folder" docs/
            fi
          done

          if [ -d stylesheets ]; then
            cp -r stylesheets docs/
          fi

          # Auto-generate index.md for any folder that's missing one
          find docs -type d | while read dir; do
            if [ ! -f "$dir/index.md" ]; then
              folder_name=$(basename "$dir")
              echo "# $folder_name" > "$dir/index.md"
              echo "" >> "$dir/index.md"
              # List all md files in this directory as links
              find "$dir" -maxdepth 1 -name "*.md" ! -name "index.md" | sort | while read f; do
                fname=$(basename "$f" .md)
                echo "- [$fname]($fname.md)" >> "$dir/index.md"
              done
            fi
          done

      - name: Deploy
        run: mkdocs gh-deploy --force
