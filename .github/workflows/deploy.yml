name: Deploy MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material mkdocs-awesome-pages-plugin mkdocs-roamlinks-plugin

      - name: Prepare docs folder
        run: |
          mkdir -p docs
          cp README.md docs/index.md

          rsync -av --include="*/" --include="*.md" --exclude="*" Academics/ docs/Academics/
          rsync -av --include="*/" --include="*.md" --exclude="*" Technology/ docs/Technology/
          rsync -av --include="*/" --include="*.md" --exclude="*" Projects/ docs/Projects/
          rsync -av --include="*/" --include="*.md" --exclude="*" Life/ docs/Life/

          if [ -d stylesheets ]; then
            rsync -av stylesheets/ docs/stylesheets/
          fi

          # Generate index.md for folders that are missing one or empty
          find docs -mindepth 1 -type d | while IFS= read -r dir; do
            if [ ! -s "$dir/index.md" ]; then
              folder_name=$(basename "$dir")
              echo "# $folder_name" > "$dir/index.md"
            fi
          done

      - name: Deploy
        run: mkdocs gh-deploy --force
